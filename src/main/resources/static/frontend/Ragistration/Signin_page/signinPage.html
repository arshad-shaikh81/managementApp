<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Society - Create Account</title>
    <link rel="stylesheet" href="signinPage.css">
</head>
<body>
<div class="page">
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 22V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v18"/>
                <path d="M9 8h1M14 8h1M9 12h1M14 12h1M9 16h1M14 16h1"/>
                <path d="M2 22h20"/>
            </svg>
        </div>
        <h1>Management Hub</h1>
        <p>Resident &amp; Management Portal</p>
    </div>

    <div class="card">
        <h2>Create your account</h2>
        <p>Enter your details to create admin account for your society</p>

        <form>
            <div class="field">
                <label for="fullname">Full Name</label>
                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input spellcheck="false" type="text" id="fullname" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/>
                    </svg>
                    <input spellcheck="false" type="email" id="email" placeholder="Enter your email address" required>
                </div>
            </div>

            <div class="field">
                <label for="phone">Phone Number</label>
                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>
            </div>

            <!-- PASSWORD FIELD -->
            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap has-toggle">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="Enter 4-digit PIN" inputmode="numeric" pattern="[0-9]*" maxlength="4" required>
                    <button type="button" class="toggle-eye" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                        <svg class="eye-svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="hint-msg" id="password-hint">Password must be exactly 4 digits</div>
            </div>

            <!-- CONFIRM PASSWORD FIELD -->
            <div class="field">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-wrap has-toggle">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="confirm-password" placeholder="Confirm 4-digit PIN" inputmode="numeric" pattern="[0-9]*" maxlength="4" required>
                    <button type="button" class="toggle-eye" onclick="togglePassword('confirm-password', this)" aria-label="Toggle password visibility">
                        <svg class="eye-svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="hint-msg" id="confirm-hint">Confirm your 4-digit PIN</div>
            </div>

            <div class="field">
                <label for="society">Society Name</label>
                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 22V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v18"/>
                        <path d="M9 8h1M14 8h1M9 12h1M14 12h1M9 16h1M14 16h1"/>
                        <path d="M2 22h20"/>
                    </svg>
                    <input spellcheck="false" type="text" id="society" placeholder="Enter your society name" required>
                </div>
            </div>

            <div class="field">
                <label for="flat">Flat Number</label>
                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/>
                    </svg>
                    <input spellcheck="false" type="text" id="flat" placeholder="e.g. A-101" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="footer-links">
            <a href="../Society_ragistration/societyragistration.html">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
                </svg>
                Register your society
            </a>
            <div class="divider"></div>
            <span>Already have an account? <a href="../Login_page/loginPage.html">Log in</a></span>
        </div>
    </div>
</div>

<script src="signinPage.js"></script>
</body>
</html>
